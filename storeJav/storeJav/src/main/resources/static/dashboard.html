<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SpareBank 1 Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; }

    header {
      background: #003087;
      color: white;
      padding: 18px 32px;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: .5px;
    }

    .layout { display: flex; min-height: calc(100vh - 60px); }

    /* ── Sidebar ── */
    .sidebar {
      width: 320px;
      min-width: 320px;
      background: #fff;
      border-right: 1px solid #dde1e7;
      padding: 24px 16px;
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin: 20px 0 8px;
    }
    .sidebar h2:first-child { margin-top: 0; }

    .btn-group { display: flex; flex-direction: column; gap: 6px; }

    button {
      padding: 9px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .875rem;
      font-weight: 500;
      text-align: left;
      transition: background .15s;
    }
    .btn-get  { background: #e8f0fe; color: #1a56db; }
    .btn-get:hover  { background: #c7d9fc; }
    .btn-post { background: #fef3e8; color: #c2660a; }
    .btn-post:hover { background: #fde0be; }

    .input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .input-row input, .input-row textarea {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: .85rem;
    }
    textarea { resize: vertical; min-height: 70px; font-family: monospace; }

    /* ── Result panel ── */
    .result-panel {
      flex: 1;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .result-header h2 { font-size: 1rem; color: #555; }

    #status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 600;
      display: none;
    }
    .badge-ok  { background: #d1fae5; color: #065f46; display: inline-block !important; }
    .badge-err { background: #fee2e2; color: #991b1b; display: inline-block !important; }

    #endpoint-label {
      font-size: .8rem;
      color: #888;
      font-family: monospace;
    }

    #result {
      background: #1e1e2e;
      color: #cdd6f4;
      border-radius: 10px;
      padding: 20px;
      font-size: .85rem;
      line-height: 1.6;
      overflow: auto;
      flex: 1;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 300px;
    }

    .spinner { display: none; margin-top: 6px; font-size:.85rem; color:#555; }
  </style>
</head>
<body>

<header>SpareBank 1 – Account Dashboard</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <h2>All Accounts</h2>
    <div class="btn-group">
      <button class="btn-get" onclick="call('GET','/api/accounts')">GET /accounts</button>
      <button class="btn-get" onclick="call('GET','/api/accounts/default')">GET /accounts/default</button>
      <button class="btn-get" onclick="call('GET','/api/accounts/keys')">GET /accounts/keys</button>
    </div>

    <h2>By Account Key</h2>
    <div class="input-row">
      <input id="accountKey" placeholder="accountKey" />
    </div>
    <div class="btn-group">
      <button class="btn-get"  onclick="callKey('')">GET /accounts/{key}</button>
      <button class="btn-get"  onclick="callKey('/details')">GET /accounts/{key}/details</button>
      <button class="btn-get"  onclick="callKey('/roles')">GET /accounts/{key}/roles</button>
    </div>

    <h2>Balance (POST)</h2>
    <div class="input-row">
      <textarea id="balanceBody" placeholder='{"accountKeys":["key1","key2"]}'></textarea>
    </div>
    <div class="btn-group">
      <button class="btn-post" onclick="callBalance()">POST /accounts/balance</button>
    </div>

    <h2>Child Account</h2>
    <div class="input-row">
      <input id="childId" placeholder="child id" />
    </div>
    <div class="btn-group">
      <button class="btn-get" onclick="callChild()">GET /accounts/child/{id}</button>
    </div>

  </aside>

  <!-- ── Result panel ── -->
  <main class="result-panel">
    <div class="result-header">
      <h2>Response</h2>
      <span id="status-badge"></span>
    </div>
    <div id="endpoint-label">— select an endpoint —</div>
    <div class="spinner" id="spinner">⏳ Loading…</div>
    <pre id="result">// results will appear here</pre>
  </main>

</div>

<script>
  const resultEl  = document.getElementById('result');
  const labelEl   = document.getElementById('endpoint-label');
  const badgeEl   = document.getElementById('status-badge');
  const spinnerEl = document.getElementById('spinner');

  function showResult(label, status, text) {
    labelEl.textContent = label;
    spinnerEl.style.display = 'none';

    badgeEl.className = '';
    badgeEl.classList.add(status >= 200 && status < 300 ? 'badge-ok' : 'badge-err');
    badgeEl.textContent = status;

    try {
      resultEl.textContent = JSON.stringify(JSON.parse(text), null, 2);
    } catch {
      resultEl.textContent = text;
    }
  }

  async function call(method, url, body = null) {
    labelEl.textContent = `${method} ${url}`;
    spinnerEl.style.display = 'block';
    resultEl.textContent = '';
    badgeEl.className = '';
    badgeEl.style.display = 'none';

    const opts = { method };
    if (body) {
      opts.body = body;
      opts.headers = { 'Content-Type': 'application/json' };
    }
    try {
      const res = await fetch(url, opts);
      const text = await res.text();
      showResult(`${method} ${url}`, res.status, text);
    } catch (err) {
      spinnerEl.style.display = 'none';
      resultEl.textContent = 'Network error: ' + err.message;
    }
  }

  function callKey(suffix) {
    const key = document.getElementById('accountKey').value.trim();
    if (!key) { alert('Please enter an accountKey'); return; }
    call('GET', `/api/accounts/${encodeURIComponent(key)}${suffix}`);
  }

  function callBalance() {
    const raw = document.getElementById('balanceBody').value.trim();
    let body;
    try {
      body = raw ? JSON.stringify(JSON.parse(raw)) : '{}';
    } catch {
      alert('Invalid JSON in balance body'); return;
    }
    call('POST', '/api/accounts/balance', body);
  }

  function callChild() {
    const id = document.getElementById('childId').value.trim();
    if (!id) { alert('Please enter a child id'); return; }
    call('GET', `/api/accounts/child/${encodeURIComponent(id)}`);
  }
</script>

</body>
</html>
